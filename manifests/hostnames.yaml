# N=4 hostname-reporting backends behind a ClusterIP Service, plus an in-cluster
# curl client. Each backend returns its own pod name so requests can be attributed
# to a replica. The Service load-balances at L4 (kube-proxy iptables).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hostnames
spec:
  replicas: 4
  selector:
    matchLabels:
      app: hostnames
  template:
    metadata:
      labels:
        app: hostnames
    spec:
      containers:
        - name: h
          image: registry.k8s.io/e2e-test-images/agnhost:2.47
          args: ["serve-hostname", "--http", "--port", "9376"]
          ports:
            - containerPort: 9376
          resources:
            requests:
              cpu: 20m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: hostnames
spec:
  selector:
    app: hostnames
  ports:
    - port: 80
      targetPort: 9376
---
apiVersion: v1
kind: Pod
metadata:
  name: curlcli
  labels:
    app: curlcli
spec:
  containers:
    - name: c
      image: curlimages/curl:8.11.0
      command: ["sleep", "36000"]
      resources:
        requests:
          cpu: 50m
          memory: 32Mi
        limits:
          cpu: 500m
          memory: 128Mi
